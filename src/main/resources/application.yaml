spring:
  application:
    name: api

  # 1. 파일 업로드 설정
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB    # 파일 하나당 최대 크기
      max-request-size: 50MB # 한 번의 HTTP 요청 최대 크기

  # 2. PostgreSQL 접속 설정
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ineedtoilet # 실제 DB 주소로 변경 필요
    username: your_username # DB 계정
    password: your_password # DB 비밀번호

  # 3. JPA / Hibernate 설정
  jpa:
    hibernate:
      # 운영 배포 시 validate / none
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

# 4. 로그 설정
logging:
  level:
    root: INFO
    com.ineedtoilet: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   #쿼리 파라미터 바인딩